{% extends "base.html" %}

{% block title %}Delete Expense | Expense Tracker{% endblock %}

{% block content %}
  <div class="card">
    <h1 class="h1">Delete Expense</h1>
    <p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>

    <form method="post" class="actions">
      {% csrf_token %}
      <button type="submit" class="btn btn--danger">Yes, delete</button>
      <a class="btn btn--secondary" href="{% url 'expense_list' %}">Cancel</a>
    </form>
  </div>
{% endblock %}
